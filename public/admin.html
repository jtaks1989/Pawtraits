<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eternised — Order Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a96e; --gold-light: #e8d5a3;
      --bg: #0d0b08; --bg-2: #141210; --bg-3: #1c1915;
      --text: #e8dcc8; --text-muted: #8a7d68;
      --border: rgba(201,169,110,0.2);
      --green: #25D366; --new: #c9a96e; --sent: #6ea8c9; --shipped: #6ec98a;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Cormorant Garamond', serif; min-height: 100vh; }

    /* LOGIN */
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .login-box { background: var(--bg-2); border: 1px solid var(--border); padding: 48px; width: 100%; max-width: 400px; text-align: center; }
    .login-brand { font-family: 'Cinzel', serif; font-size: 22px; letter-spacing: 5px; color: var(--gold); margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: var(--text-muted); font-style: italic; margin-bottom: 32px; }
    .login-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); display: block; text-align: left; margin-bottom: 8px; }
    .login-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'Cormorant Garamond', serif; font-size: 18px; padding: 12px 14px; outline: none; margin-bottom: 16px; letter-spacing: 4px; }
    .login-input:focus { border-color: rgba(201,169,110,0.6); }
    .login-btn { width: 100%; background: var(--gold); color: var(--bg); font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; border: none; padding: 16px; cursor: pointer; transition: background 0.2s; }
    .login-btn:hover { background: var(--gold-light); }
    .login-error { color: #e07070; font-size: 13px; font-style: italic; margin-top: 8px; display: none; }

    /* DASHBOARD */
    .dashboard { display: none; }
    .topbar { background: var(--bg-2); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .topbar-brand { font-family: 'Cinzel', serif; font-size: 18px; letter-spacing: 4px; color: var(--gold); }
    .topbar-right { display: flex; align-items: center; gap: 24px; }
    .topbar-date { font-size: 13px; color: var(--text-muted); font-style: italic; }
    .logout-btn { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); background: none; border: 1px solid var(--border); padding: 6px 14px; cursor: pointer; transition: all 0.2s; }
    .logout-btn:hover { color: var(--gold); border-color: var(--gold); }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 2px; padding: 24px 32px; }
    .stat { background: var(--bg-2); border: 1px solid var(--border); padding: 24px; }
    .stat-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: var(--gold-light); line-height: 1; }
    .stat-sub { font-size: 13px; color: var(--text-muted); font-style: italic; margin-top: 4px; }

    /* FILTERS */
    .filters { padding: 0 32px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .filter-btn { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 7px 16px; border: 1px solid var(--border); background: none; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover, .filter-btn.active { border-color: var(--gold); color: var(--gold); }
    .refresh-btn { margin-left: auto; font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 7px 16px; border: 1px solid var(--border); background: none; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
    .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ORDERS TABLE */
    .orders-wrap { padding: 0 32px 48px; overflow-x: auto; }
    .orders-table { width: 100%; border-collapse: collapse; min-width: 900px; }
    .orders-table th { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .orders-table td { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 15px; vertical-align: top; }
    .orders-table tr:hover td { background: var(--bg-2); }
    .order-name { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold-light); margin-bottom: 2px; }
    .order-email { font-size: 13px; color: var(--text-muted); font-style: italic; }
    .order-phone { font-size: 13px; color: var(--text-muted); }
    .order-package { font-family: 'Cinzel', serif; font-size: 12px; color: var(--text); }
    .order-size { font-size: 13px; color: var(--text-muted); font-style: italic; }
    .order-amount { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--gold-light); font-weight: 300; }
    .order-date { font-size: 13px; color: var(--text-muted); font-style: italic; }
    .order-address { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .wa-btn { display: inline-flex; align-items: center; gap: 6px; background: rgba(37,211,102,0.1); border: 1px solid rgba(37,211,102,0.3); color: #4ecb7a; font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; padding: 6px 10px; text-decoration: none; transition: all 0.2s; white-space: nowrap; }
    .wa-btn:hover { background: rgba(37,211,102,0.2); }

    /* STATUS BADGE */
    .status-select { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; padding: 6px 10px; border: 1px solid; background: none; cursor: pointer; outline: none; transition: all 0.2s; -webkit-appearance: none; appearance: none; }
    .status-select.new { color: var(--new); border-color: rgba(201,169,110,0.4); background: rgba(201,169,110,0.08); }
    .status-select.sent { color: var(--sent); border-color: rgba(110,168,201,0.4); background: rgba(110,168,201,0.08); }
    .status-select.shipped { color: var(--shipped); border-color: rgba(110,201,138,0.4); background: rgba(110,201,138,0.08); }
    .status-select option { background: #1c1915; color: var(--text); }

    /* EMPTY */
    .empty { text-align: center; padding: 80px 24px; color: var(--text-muted); font-style: italic; font-size: 18px; }

    /* LOADING */
    .loading { text-align: center; padding: 80px 24px; }
    .loading-text { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 4px; text-transform: uppercase; color: var(--text-muted); }

    @media (max-width: 600px) {
      .stats { padding: 16px; }
      .filters { padding: 0 16px 16px; }
      .orders-wrap { padding: 0 16px 48px; }
      .topbar { padding: 16px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <div class="login-brand">ETERNISED</div>
      <div class="login-sub">Order Management Dashboard</div>
      <label class="login-label">Password</label>
      <input class="login-input" type="password" id="passwordInput" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()" />
      <button class="login-btn" onclick="login()">Enter Dashboard</button>
      <div class="login-error" id="loginError">Incorrect password. Try again.</div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="topbar-brand">ETERNISED — Orders</div>
      <div class="topbar-right">
        <div class="topbar-date" id="currentDate"></div>
        <button class="logout-btn" onclick="logout()">Log Out</button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value" id="statRevenue">$0</div>
        <div class="stat-sub">All time</div>
      </div>
      <div class="stat">
        <div class="stat-label">Total Orders</div>
        <div class="stat-value" id="statOrders">0</div>
        <div class="stat-sub">Completed payments</div>
      </div>
      <div class="stat">
        <div class="stat-label">Pending Delivery</div>
        <div class="stat-value" id="statPending">0</div>
        <div class="stat-sub">New + sent</div>
      </div>
      <div class="stat">
        <div class="stat-label">Avg Order Value</div>
        <div class="stat-value" id="statAvg">$0</div>
        <div class="stat-sub">Per order</div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All Orders</button>
      <button class="filter-btn" onclick="setFilter('new', this)">🟡 New</button>
      <button class="filter-btn" onclick="setFilter('sent', this)">🔵 Preview Sent</button>
      <button class="filter-btn" onclick="setFilter('shipped', this)">🟢 Shipped</button>
      <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
    </div>

    <!-- ORDERS -->
    <div class="orders-wrap">
      <div class="loading" id="loadingState">
        <div class="loading-text">Loading orders...</div>
      </div>
      <table class="orders-table" id="ordersTable" style="display:none;">
        <thead>
          <tr>
            <th>Customer</th>
            <th>Package</th>
            <th>Amount</th>
            <th>Address</th>
            <th>Date</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
      <div class="empty" id="emptyState" style="display:none;">No orders found.</div>
    </div>

  </div>

  <script>
    // ── PASSWORD (change this to whatever you want)
    const ADMIN_PASSWORD = 'eternised2024';

    let allOrders = [];
    let currentFilter = 'all';

    // ── LOGIN
    function login() {
      const pwd = document.getElementById('passwordInput').value;
      if (pwd === ADMIN_PASSWORD) {
        sessionStorage.setItem('admin_auth', '1');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        loadOrders();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function logout() {
      sessionStorage.removeItem('admin_auth');
      location.reload();
    }

    // Auto-login if session exists
    if (sessionStorage.getItem('admin_auth') === '1') {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      loadOrders();
    }

    // ── LOAD ORDERS
    async function loadOrders() {
      document.getElementById('loadingState').style.display = 'block';
      document.getElementById('ordersTable').style.display = 'none';
      document.getElementById('emptyState').style.display = 'none';

      try {
        const res = await fetch('/api/orders');
        const data = await res.json();
        allOrders = data.orders || [];
        updateStats();
        renderOrders();
      } catch (err) {
        document.getElementById('loadingState').innerHTML = '<div class="loading-text">Error loading orders. Check API.</div>';
      }
    }

    // ── STATS
    function updateStats() {
      const total = allOrders.reduce((sum, o) => sum + o.amount, 0);
      const pending = allOrders.filter(o => o.status === 'new' || o.status === 'sent').length;
      const avg = allOrders.length ? Math.round(total / allOrders.length / 100) : 0;
      document.getElementById('statRevenue').textContent = '$' + (total / 100).toLocaleString();
      document.getElementById('statOrders').textContent = allOrders.length;
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statAvg').textContent = '$' + avg;
    }

    // ── RENDER
    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderOrders();
    }

    function renderOrders() {
      const filtered = currentFilter === 'all' ? allOrders : allOrders.filter(o => o.status === currentFilter);
      const tbody = document.getElementById('ordersBody');
      document.getElementById('loadingState').style.display = 'none';

      if (filtered.length === 0) {
        document.getElementById('ordersTable').style.display = 'none';
        document.getElementById('emptyState').style.display = 'block';
        return;
      }

      document.getElementById('ordersTable').style.display = 'table';
      document.getElementById('emptyState').style.display = 'none';

      tbody.innerHTML = filtered.map(order => {
        const date = new Date(order.created * 1000).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        const amount = '$' + (order.amount / 100).toLocaleString();
        const waMsg = encodeURIComponent(`Hi ${order.name.split(' ')[0]}, your Eternised portrait is ready! ♛`);
        const waLink = `https://wa.me/${order.phone.replace(/\D/g,'')}?text=${waMsg}`;
        const addressParsed = (() => { try { return JSON.parse(order.address); } catch { return null; } })();
        const addressStr = addressParsed ? [addressParsed.line1, addressParsed.line2, addressParsed.city, addressParsed.country].filter(Boolean).join(', ') : order.address;

        return `
          <tr>
            <td>
              <div class="order-name">${order.name}</div>
              <div class="order-email">${order.email}</div>
              <div class="order-phone">${order.phone}</div>
            </td>
            <td>
              <div class="order-package">${capitalise(order.package)}</div>
              <div class="order-size">${order.size !== '—' ? order.size : 'Digital'}</div>
            </td>
            <td><div class="order-amount">${amount}</div></td>
            <td><div class="order-address">${order.package === 'digital' ? '— Digital delivery' : addressStr || '—'}</div></td>
            <td><div class="order-date">${date}</div></td>
            <td>
              <select class="status-select ${order.status}" onchange="updateStatus('${order.id}', this)">
                <option value="new" ${order.status === 'new' ? 'selected' : ''}>🟡 New</option>
                <option value="sent" ${order.status === 'sent' ? 'selected' : ''}>🔵 File Sent</option>
                <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>🟢 Shipped</option>
              </select>
            </td>
            <td>
              <a href="${waLink}" target="_blank" class="wa-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.890-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                WhatsApp
              </a>
            </td>
          </tr>
        `;
      }).join('');
    }

    // ── UPDATE STATUS
    async function updateStatus(id, select) {
      const status = select.value;
      select.className = `status-select ${status}`;
      try {
        await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, status })
        });
        // Update local data
        const order = allOrders.find(o => o.id === id);
        if (order) order.status = status;
        updateStats();
      } catch (err) {
        console.error('Failed to update status:', err);
      }
    }

    function capitalise(str) {
      if (!str) return '—';
      return str.charAt(0).toUpperCase() + str.slice(1);
    }
  </script>

</body>
</html>
